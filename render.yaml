services:
  - type: web
    name: ccmc-maternal-tracker
    env: docker
    region: singapore
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: EXCEL_URL
        value: https://api.github.com/repos/suganmanthransg2024aids-ctrl/maternal-health-command-center/releases/assets/467887734
      - key: PYTHONUNBUFFERED
        value: "1"
